spring:
  application:
    name: petkok-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate          # 스키마 소유는 Flyway. JPA는 검증만.
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET}
  access-token-validity-ms: ${JWT_ACCESS_TTL:1800000}       # 30분
  refresh-token-validity-ms: ${JWT_REFRESH_TTL:1209600000}  # 14일

r2:
  account-id: ${R2_ACCOUNT_ID:dummy}
  access-key: ${R2_ACCESS_KEY:dummy}
  secret-key: ${R2_SECRET_KEY:dummy}
  bucket: ${R2_BUCKET:petkok}
  endpoint: ${R2_ENDPOINT:https://dummy.r2.cloudflarestorage.com}
  public-base-url: ${R2_PUBLIC_BASE_URL:https://cdn.example.com}

management:
  endpoints:
    web:
      exposure:
        include: health
